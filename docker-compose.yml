services:
  database:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: health_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-health_db}
      POSTGRES_USER: ${POSTGRES_USER:-health_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-health_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health_user} -d ${POSTGRES_DB:-health_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    container_name: health_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-health_user}:${POSTGRES_PASSWORD:-health_pass}@database:5432/${POSTGRES_DB:-health_db}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.27-alpine}
    container_name: health_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
