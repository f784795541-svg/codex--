services:
  database:
    image: postgres:16-alpine
    container_name: health_database
    environment:
      POSTGRES_DB: health_db
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user -d health_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: health_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://health_user:health_pass@database:5432/health_db
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: health_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
